name = "personal-radar-cron"
main = "src/worker.ts"
compatibility_date = "2026-06-12"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[[d1_databases]]
binding = "DB"
database_name = "personal-radar"
database_id = "cd24444b-000a-4435-9c7b-ee3c659a41cf"

[triggers]
crons = [
  "0 */6 * * *",
  "30 0 * * *"
]

[vars]
AI_ENABLED = "auto"
AI_PROVIDER = "gemini"
AI_FALLBACK_PROVIDER = "deepseek"
AI_MAX_ITEMS_PER_DAY = "20"
AI_MONTHLY_BUDGET_USD = "1"
BANDSINTOWN_APP_ID = "personal-radar"
ICA_CHECK_ENABLED = "false"
ICA_TARGET_BEFORE = "2026-07-01"
