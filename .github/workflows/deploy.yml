name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so the post-deploy version bump can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump app version
        id: version
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "Bumped app version to $(node -p "require('./package.json').version")"

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply personal-radar --remote

      - name: Deploy Pages
        run: >
          npx wrangler pages deploy .svelte-kit/cloudflare
          --project-name personal-radar
          --branch main
          --commit-hash "${GITHUB_SHA}"

      - name: Deploy cron Worker
        run: npm run deploy:cron

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version file changes to commit"
            exit 0
          fi
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin HEAD:main
